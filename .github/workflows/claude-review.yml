name: CodeRabbit PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  coderabbit-review:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@coderabbit'))
    steps:
      - name: CodeRabbit Review
        uses: coderabbitai/ai-pr-reviewer@latest
        with:
          review_comment: true
          # CodeRabbit handles everything automatically
          # Free for open source repos
          # Reviews code quality, security, performance, docs

  coderabbit-respond:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@coderabbit')
    runs-on: ubuntu-latest
    steps:
      - name: Respond to @coderabbit mention
        uses: coderabbitai/ai-pr-reviewer@latest
        with:
          review_comment: true
