name: Validate PR

on:
  pull_request:
    paths:
      - '*/catalog.json'
      - 'scripts/validate-catalogs.js'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate catalogs
        run: node scripts/validate-catalogs.js

      - name: Validate JSON syntax
        run: |
          for f in */catalog.json; do
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All catalog.json files are valid JSON"

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            let output;
            try {
              output = execSync('node scripts/validate-catalogs.js 2>&1', { encoding: 'utf8' });
            } catch (e) {
              output = e.stdout || e.message;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Catalog Validation Failed\\n\\n\`\`\`\\n${output}\\n\`\`\`\\n\\nPlease fix the issues above and push again.`
            });
